version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: forkly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forkly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forkly_secret}
      POSTGRES_DB: ${POSTGRES_DB:-forkly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    # No ports exposed — DB is only accessible within the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forkly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: forkly-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-forkly}:${POSTGRES_PASSWORD:-forkly_secret}@postgres:5432/${POSTGRES_DB:-forkly}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Optional — leave empty for demo mode
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPOONACULAR_API_KEY: ${SPOONACULAR_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PLUS_PRICE_ID: ${STRIPE_PLUS_PRICE_ID:-}
      STRIPE_FAMILY_PRICE_ID: ${STRIPE_FAMILY_PRICE_ID:-}
      STRIPE_PORTAL_CONFIG_ID: ${STRIPE_PORTAL_CONFIG_ID:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forkly.rule=Host(`${APP_DOMAIN:-forkly.localhost}`)"
      - "traefik.http.services.forkly.loadbalancer.server.port=3000"

volumes:
  postgres_data:
