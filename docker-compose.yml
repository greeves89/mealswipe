version: "3.8"

services:
  mealswipe:
    build: .
    container_name: mealswipe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mealswipe.rule=Host(`mealswipe.localhost`)"
      - "traefik.http.services.mealswipe.loadbalancer.server.port=3000"
